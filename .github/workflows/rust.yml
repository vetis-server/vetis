name: Rust

permissions:
  contents: read
  
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:    
    name: Build and Test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1'

    - uses: Swatinem/rust-cache@v2

    - name: Run vetis tests
      run: |
        cd vetis

        cargo test --features "http1 tokio-rt tokio-rust-tls static-files reverse-proxy auth __interface_wsgi" --no-default-features
        cargo test --features "http2 tokio-rt tokio-rust-tls static-files reverse-proxy auth __interface_wsgi" --no-default-features
        cargo test --features "http3 tokio-rt tokio-rust-tls static-files reverse-proxy auth __interface_wsgi" --no-default-features

        cargo test --features "http1 smol-rt smol-rust-tls static-files reverse-proxy auth __interface_wsgi" --no-default-features
        cargo test --features "http2 smol-rt smol-rust-tls static-files reverse-proxy auth __interface_wsgi" --no-default-features
        cargo test --features "http3 smol-rt smol-rust-tls static-files reverse-proxy auth __interface_wsgi" --no-default-features

        cd ..

    - name: Run vetis-macros tests
      run: |
        cd vetis-macros

        cargo test

        cd ..