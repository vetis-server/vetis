[workspace]
# Use the latest resolver available
resolver = "3"
# Include both parts of the library in the workspace
members = [
  "vetis",
  "vetis-macros",
  "vetis-smol",
  "vetis-tokio",
  "examples/simple", 
#   "interfaces/vetis-asgi",
#   "interfaces/vetis-fcgi",
#   "interfaces/vetis-rack",
#   "interfaces/vetis-rsgi",
#   "interfaces/vetis-sapi",
#   "interfaces/vetis-scgi",
#   "interfaces/vetis-wsgi",
]

[profile.release]
strip = true
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
