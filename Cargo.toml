[workspace]
# Use the latest resolver available
resolver = "3"
# Include both parts of the library in the workspace
members = [
  "vetis",
  "vetis-asgi",
  "vetis-core",
  "vetis-fcgi",
  "vetis-macros",
  "vetis-rack",
  "vetis-rsgi",
  "vetis-sapi",
  "vetis-scgi",
  "vetis-wsgi",
  "examples/simple", 
]

[profile.release]
strip = true
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
