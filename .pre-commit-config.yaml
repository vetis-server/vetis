repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: "https://github.com/gitleaks/gitleaks"
    rev: "v8.24.2"
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: cargo-fmt
        name: "cargo fmt"
        entry: "cargo fmt --all --check"
        language: "system"
        types: ["rust"]
        pass_filenames: false

      - id: cargo-nextest
        name: "cargo nextest"
        # Remove exports below if you don't have these tools installed
        entry: bash -c "
          export RUSTC_WRAPPER=kache &&
          export RUSTC_LINKER=clang &&
          export CARGO_BUILD_RUSTFLAGS="-C link-arg=-fuse-ld=mold" &&
          cargo test --doc &&
          cargo nextest run -j1
          "
        language: "system"
        types: ["rust"]
        pass_filenames: false

      - id: cargo-nextest-vetis-smol-http1-rust-tls
        name: "test vetis-smol with http1 and rust-tls"
        entry: |
          cargo nextest run --package vetis-smol --features "http1 rust-tls deboa-smol/http1 deboa-smol/rust-tls deboa-smol/default-rustls-provider deboa-smol/default-rustls-verifier" --no-default-features
        language: "system"
        types: ["rust"]
        pass_filenames: false

      - id: cargo-nextest-vetis-smol-http2-rust-tls
        name: "test vetis-smol with http2 and rust-tls"
        entry: |
          cargo nextest run --package vetis-smol --features "http2 rust-tls deboa-smol/http2 deboa-smol/rust-tls deboa-smol/default-rustls-provider deboa-smol/default-rustls-verifier" --no-default-features
        language: "system"
        types: ["rust"]
        pass_filenames: false

      - id: cargo-nextest-vetis-smol-http3-rust-tls
        name: "test vetis-smol with http3 and rust-tls"
        entry: |
          cargo nextest run --package vetis-smol --features "http3 rust-tls  deboa-smol/http3 deboa-smol/rust-tls deboa-smol/default-rustls-provider deboa-smol/default-rustls-verifier" --no-default-features
        language: "system"
        types: ["rust"]
        pass_filenames: false        

      - id: cargo-nextest-vetis-tokio-http1-rust-tls
        name: "test vetis-tokio with http1 and rust-tls"
        entry: |
          cargo nextest run --package vetis-tokio --features "http1 rust-tls deboa-tokio/http1 deboa-tokio/rust-tls deboa-tokio/default-rustls-provider deboa-tokio/default-rustls-verifier" --no-default-features
        language: "system"
        types: ["rust"]
        pass_filenames: false

      - id: cargo-nextest-vetis-tokio-http2-rust-tls
        name: "test vetis-tokio with http2 and rust-tls"
        entry: |
          cargo nextest run --package vetis-tokio --features "http2 rust-tls deboa-tokio/http2 deboa-tokio/rust-tls deboa-tokio/default-rustls-provider deboa-tokio/default-rustls-verifier" --no-default-features
        language: "system"
        types: ["rust"]
        pass_filenames: false

      - id: cargo-nextest-vetis-tokio-http3-rust-tls
        name: "test vetis-tokio with http3 and rust-tls"
        entry: |
          cargo nextest run --package vetis-tokio --features "http3 rust-tls deboa-tokio/http3 deboa-tokio/rust-tls deboa-tokio/default-rustls-provider deboa-tokio/default-rustls-verifier" --no-default-features
        language: "system"
        types: ["rust"]
        pass_filenames: false        

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        # Optional: Add --fix to automatically correct format violations
        args: ["--fix"]
