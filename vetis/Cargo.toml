[package]
name = "vetis"
version = "0.1.4-beta.5"
edition = "2021"
authors = ["Rogerio Araújo <rogerio.araujo@gmail.com>"]
repository = "https://github.com/ararog/vetis"
homepage = "https://github.com/ararog/vetis"
description = "Very Tiny Server"
readme = "README.md"
license = "MIT"
keywords = ["http", "networking", "server", "rest-server"]
publish = true
rust-version = "1.75.0"

[package.metadata.wix]
upgrade-guid = "76DF79DF-E1F9-40A7-89D1-3190562C7851"
path-guid = "FEA82F70-7E57-447F-A361-76FB5E25BA5F"
license = false
eula = false

[features]
default = [
  "tokio-rt",
  "http1",
  "tokio-rust-tls",
  # Leaving them enable for testing purposes, 
  # they must be disabled at time of publish/release.
  "static-files",
  "reverse-proxy",
  "auth",
  "__interface_wsgi",
  "__interface_fcgi",
  "__interface_rack",
]

tokio-rt = [
  "dep:tokio",
  "hyper-util/tokio",
  "tokio/rt-multi-thread",
  "tokio/net",
  "tokio/signal",
  "peekable/tokio",
  "rt-gate/tokio-rt",
  "quinn/runtime-tokio",
  "__deboa_tokio",
  "dep:tokio-util",
  "hyper-body-utils/tokio-rt",
  "crossfire/tokio",
  "vetis-core/tokio-rt",
]

smol-rt = [
  "dep:smol",
  "dep:smol-hyper",
  "dep:smol-macros",
  "dep:macro_rules_attribute",
  "dep:async-signal",
  "dep:signal-hook",
  "peekable/future",
  "rt-gate/smol-rt",
  "quinn/runtime-smol",
  "__deboa_smol",
  "dep:futures-lite",
  "dep:blocking",
  "hyper-body-utils/smol-rt",
  "crossfire/async_std",
  "vetis-core/smol-rt",
]

# compio-rt = [
#   "rt-gate/compio-rt",
#   "hyper-body-utils/compio-rt",
# ]

tokio-rust-tls = ["tokio-rustls", "rustls", "rustls-provider"]
smol-rust-tls = ["futures-rustls", "rustls", "rustls-provider"]
#compio-rust-tls = []

auth = ["argon2/password-hash", "argon2/alloc", "bcrypt/std", "base64"]

interface = []
__interface_asgi = ["interface", "asgi", "vetis-asgi/tokio-rt"]
__interface_fcgi = ["interface", "fcgi", "vetis-fcgi/tokio-rt"]
__interface_sapi = ["interface", "sapi", "vetis-sapi/tokio-rt"]
__interface_scgi = ["interface", "scgi", "vetis-scgi/tokio-rt"]
__interface_rack = ["interface", "rack", "vetis-rack/tokio-rt"]
__interface_rsgi = ["interface", "rsgi", "vetis-rsgi/tokio-rt"]
__interface_wsgi = ["interface", "wsgi", "vetis-wsgi/tokio-rt"]

asgi = []
fcgi = []
rack = []
rsgi = []
sapi = []
scgi = []
wsgi = []

# For smol testing purposes
__interface_asgi_smol = ["interface", "asgi", "vetis-asgi/smol-rt"]
__interface_fcgi_smol = ["interface", "fcgi", "vetis-fcgi/smol-rt"]
__interface_rack_smol = ["interface", "rack", "vetis-rack/smol-rt"]
__interface_rsgi_smol = ["interface", "rsgi", "vetis-rsgi/smol-rt"]
__interface_sapi_smol = ["interface", "sapi", "vetis-sapi/smol-rt"]
__interface_scgi_smol = ["interface", "scgi", "vetis-scgi/smol-rt"]
__interface_wsgi_smol = ["interface", "wsgi", "vetis-wsgi/smol-rt"]


static-files = [
  "dep:mime",
  "dep:minimime",
  "dep:regex",
  "moka/future",
  "dep:parse_duration",
]

reverse-proxy = []
__deboa_tokio = ["deboa/tokio-rt", "deboa/tokio-rust-tls"]
__deboa_smol = ["deboa/smol-rt", "deboa/smol-rust-tls"]

rustls-provider = ["__rustls_awc_lc_rs"]
__rustls_awc_lc_rs = ["futures-rustls/aws-lc-rs", "quinn/rustls-aws-lc-rs"]
__rustls_ring = ["futures-rustls/ring", "quinn/rustls-ring"]
__rustls_rustcrypto = ["dep:rustls-rustcrypto"]

http1 = [
  "hyper/http1",
  "hyper/server",
  "hyper-util/server",
  "hyper-util/http1",
  "deboa/http1",
]
http2 = [
  "hyper/http2",
  "hyper/server",
  "hyper-util/server",
  "hyper-util/http2",
  "deboa/http2",
]
http3 = [
  "hyper/server",
  "hyper-util/server",
  "dep:h3",
  "dep:h3-quinn",
  "dep:quinn",
  "deboa/http3",
  "hyper-body-utils/http3",
]

hotpath = ["hotpath/hotpath"]
hotpath-alloc = ["hotpath/hotpath-alloc"]

[dependencies]
argon2 = { version = "0.5.3", optional = true, default-features = false }
async-signal = { version = "0.2.12", optional = true, default-features = false }
base64 = { version = "0.22.1", optional = true, default-features = false }
bcrypt = { version = "0.19.0", optional = true, default-features = false }
blocking = { version = "1.6.2", optional = true, default-features = false }
bytes = "1.11.1"
cfg-if = "1.0.4"
clap = { version = "4.5.61", features = [
  "derive",
  "std",
], default-features = false }
crossfire = { version = "3.1.6", optional = true, default-features = false }
deboa = { version = "0.1.0-beta.11", optional = true, default-features = false }
env_logger = "0.11.9"
futures-lite = { version = "2.6.1", optional = true, default-features = false }
futures-rustls = { version = "0.26.0", optional = true, default-features = false }
futures-util = "0.3.32"
h3 = { version = "0.0.8", optional = true, default-features = false }
h3-quinn = { version = "0.0.10", optional = true, default-features = false }
hotpath = "0.13.0"
http = "1.3.1"
http-body-util = { version = "0.1.3" }
hyper = { version = "1.8.1", optional = true, default-features = false }
hyper-body-utils = { version = "0.1.6-beta.6", optional = true, default-features = false }
hyper-util = { version = "0.1.20", optional = true, default-features = false }
log = "0.4.28"
macro_rules_attribute = { version = "0.2.2", optional = true, default-features = false }
mimalloc = "0.1.48"
mime = { version = "0.3.17", optional = true, default-features = false }
minimime = { version = "1.0.0", optional = true, default-features = false }
moka = { version = "0.12.14", optional = true, default-features = false }
parse_duration = { version = "2.1.1", optional = true, default-features = false }
peekable = { version = "0.4.1", optional = true, default-features = false }
quinn = { version = "*", optional = true, default-features = false }
radix_trie = "0.3.0"
rand = "0.9.2"
regex = { version = "1.12.3", optional = true, default-features = false }
rt-gate = { version = "0.1.3", optional = true, default-features = false }
rustls = { version = "0.23.37", optional = true, default-features = false }
rustls-rustcrypto = { version = "0.0.2-alpha", optional = true }
serde = { version = "1.0.226", features = ["derive"] }
serde_yaml_ng = "0.10.0"
signal-hook = { version = "0.4.3", optional = true, default-features = false }
smol = { version = "2.0.2", optional = true, default-features = false }
smol-hyper = { version = "0.1.1", optional = true, default-features = false }
smol-macros = { version = "0.1.1", optional = true, default-features = false }
socket2 = "0.6.3"
thiserror = "2.0.17"
time = { version = "0.3.41", features = ["formatting"] }
tokio = { version = "1.50.0", optional = true, default-features = false }
tokio-rustls = { version = "0.26.0", optional = true, default-features = false }
tokio-util = { version = "0.7.18", optional = true, default-features = false }
url = "2.5.7"
vetis-core = { version = "0.1.0", path = "../vetis-core", optional = true, default-features = false }
vetis-asgi = { version = "0.1.0", path = "../vetis-asgi", optional = true, default-features = false }
vetis-fcgi = { version = "0.1.0", path = "../vetis-fcgi", optional = true, default-features = false }
vetis-rack = { version = "0.1.0", path = "../vetis-rack", optional = true, default-features = false }
vetis-rsgi = { version = "0.1.0", path = "../vetis-rsgi", optional = true, default-features = false }
vetis-sapi = { version = "0.1.0", path = "../vetis-sapi", optional = true, default-features = false }
vetis-scgi = { version = "0.1.0", path = "../vetis-scgi", optional = true, default-features = false }
vetis-wsgi = { version = "0.1.0", path = "../vetis-wsgi", optional = true, default-features = false }

[dev-dependencies]
tokio = { version = "1.50.0", default-features = false, features = ["macros"] }
